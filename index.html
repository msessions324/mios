<style>

  .pill-active { color:var(--amber); border-color:var(--amber); }

    display:flex; flex-direction:column; padding: 14px; backdrop-filter: blur(2px); }
  .palette-box { max-width: 640px; width:100%; margin: 0 auto; display:flex; flex-direction:column; height:100%; }
  .palette-input-row { display:flex; gap:8px; align-items:center; border:1px solid var(--amber); background:var(--bg-panel); padding:10px 12px; }

  .palette-mic { background:none; border:1px solid var(--line); color:var(--text-dim); border-radius:6px; padding:6px 9px; font-size:14px; }
  .palette-mic.listening { color: var(--red-alert); border-color: var(--red-alert); animation: blink 1s infinite; }

  .calc-result { font-size:28px; color:var(--cyan); font-weight:700; word-wrap:break-word; }
  .calc-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
  .calc-btn { background:var(--bg-panel-2); border:1px solid var(--line); color:var(--text-primary); padding:12px 0; font-size:12px; }
  .calc-btn:active { background:var(--bg-panel); }
  .calc-btn-op { color:var(--amber); }
  .calc-btn-eq { background:var(--amber); color:var(--bg-void); font-weight:700; }
  .calc-btn-fn { color:var(--cyan); font-size:10.5px; }

  .home-widget { border:1px solid var(--line); background:var(--bg-panel); margin:0 0 10px; }
  .home-widget-head { display:flex; justify-content:space-between; align-items:center; padding:8px 11px; border-bottom:1px solid var(--line); background:var(--bg-panel-2); }
  .home-widget-body { padding:12px; }
  .home-widget .weather-hero { justify-content:center; text-align:center; }
  .home-widget .stat-grid { text-align:center; }

  .home-map .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.92) contrast(0.9) saturate(0.6); }
  .home-map .leaflet-control-attribution { background: rgba(13,20,24,0.8) !important; color: var(--text-dim) !important; font-size: 8px !important; }
  .home-map .leaflet-control-attribution a { color: var(--text-dim) !important; }

  .section-block { max-width:900px; margin:0 auto; padding:0 12px; }
  .section-label { padding:14px 2px 8px; color:var(--text-dim); }

  .pulse-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .pulse-btn { display:flex; align-items:center; gap:10px; padding:14px 12px; border:1px solid var(--line); background:var(--bg-panel-2); color:var(--text-primary); font-size:11px; letter-spacing:0.05em; }
  .pulse-btn:active { background:var(--bg-panel); }
  .pulse-btn:disabled { opacity:0.5; }
  .pulse-swatch { width:20px; height:20px; border-radius:50%; background:var(--swatch); border:1px solid rgba(255,255,255,0.25); flex-shrink:0; }

  .core-msg { margin-bottom:12px; }
  .core-msg-role { font-size:8px; letter-spacing:0.08em; color:var(--text-dim); margin-bottom:3px; }
  .core-msg-user .core-msg-role { color:var(--cyan); }
  .core-msg-assistant .core-msg-role { color:var(--amber); }
  .core-msg-text { font-size:12px; line-height:1.6; color:var(--text-primary); white-space:pre-wrap; }
</style>

<body>
<div id="root"></div>
<script type="text/plain" id="app-source">

const { useState, useEffect, useRef, useCallback } = React;

// ---------------------------------------------------------------------------
// Cedar City, UT reference point
// ---------------------------------------------------------------------------
const LAT = 37.6775;
const LON = -113.0619;
const ELEV_FT = 5623;
const BBOX = { lamin: 36.88, lamax: 38.48, lomin: -114.06, lomax: -112.06 };

const DEFAULT_AIO_USERNAME = "MIOS";
const DEFAULT_AIO_KEY = "aio_eHzH37bfkAOTTnS0qYtk94LUGufy";
const LONGSHOT_FEEDS = ["longshot-temp", "longshot-pressure", "longshot-lat", "longshot-lon", "longshot-rssi"];

const WMO = {
  0: "CLEAR", 1: "MOSTLY CLEAR", 2: "PARTLY CLOUDY", 3: "OVERCAST",
  45: "FOG", 48: "RIME FOG",
  51: "LIGHT DRIZZLE", 53: "DRIZZLE", 55: "HEAVY DRIZZLE",
  61: "LIGHT RAIN", 63: "RAIN", 65: "HEAVY RAIN",
  71: "LIGHT SNOW", 73: "SNOW", 75: "HEAVY SNOW", 77: "SNOW GRAINS",
  80: "RAIN SHOWERS", 81: "RAIN SHOWERS", 82: "VIOLENT SHOWERS",
  85: "SNOW SHOWERS", 86: "HEAVY SNOW SHOWERS",
  95: "THUNDERSTORM", 96: "T-STORM / HAIL", 99: "SEVERE T-STORM",
};

const ICONS = {
  weather: "☁", storm: "⚠", flights: "✈", iss: "◎", longshot: "▲",
  projects: "⚙", notes: "✎", units: "▭", countdown: "◷", calc: "🧮", pulse: "💡",
  settings: "🛠", backup: "💾", budget: "💰", log: "📜", core: "🧠",
  back: "←", refresh: "↻", plus: "+", trash: "✕", check: "✓",
};


function fetchWithTimeout(url, opts = {}, ms = 6000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), ms);
  return fetch(url, { ...opts, signal: controller.signal }).finally(() => clearTimeout(id));
}
async function fetchWithRetry(url, opts = {}, attempts = 2, ms = 6000) {
  let lastErr;
  for (let i = 0; i < attempts; i++) {
    try {
      const res = await fetchWithTimeout(url, opts, ms);
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    } catch (e) {
      lastErr = e;
      if (i < attempts - 1) await new Promise((r) => setTimeout(r, 1200));
    }
  }
  throw lastErr;
}
async function loadJSON(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch (e) { return fallback; }
}
async function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}
function todayKey(d = new Date()) { return d.toISOString().slice(0, 10); }
function nmDistance(lat1, lon1, lat2, lon2) {
  const R = 3440.065;
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLon = ((lon2 - lon1) * Math.PI) / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function useClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);
  return now;
}

function StatusLED({ status }) {
  const map = { ok: "var(--green-ok)", sim: "var(--amber)", down: "var(--red-alert)", pending: "var(--text-dim)" };
  return <span style={{ display:"inline-block", width:7, height:7, borderRadius:"50%", background:map[status]||map.pending,
    boxShadow: status==="ok" ? "0 0 6px var(--green-ok)" : status==="down" ? "0 0 6px var(--red-alert)" : "none",
    animation: status==="pending" ? "blink 1.1s infinite" : "none", flexShrink:0 }} />;
}

function AppShell({ title, icon, status, onBack, onRefresh, children }) {
  return (
    <div className="app-shell">
      <div className="app-shell-head">
        <button className="icon-btn back-btn" onClick={onBack}>{ICONS.back}</button>
        <span>{icon}</span>
        <span className="app-shell-title">{title}</span>
        <div className="app-shell-right">
          {onRefresh && <button className="icon-btn" onClick={onRefresh}>{ICONS.refresh}</button>}
          {status && <StatusLED status={status} />}
        </div>
      </div>
      <div className="app-shell-body">{children}</div>
    </div>
  );
}
function SimBanner({ text }) { return <div className="sim-banner">⚠ {text}</div>; }

// ---------- WEATHER ----------
function simulatedWeather() {
  const high = 88 + Math.round(Math.random()*8), low = 56 + Math.round(Math.random()*8);
  const temp = Math.round((high+low)/2 + (Math.random()*6-3));
  return {
    current: { temperature_2m: temp, apparent_temperature: temp-2, relative_humidity_2m: 18+Math.round(Math.random()*15),
      wind_speed_10m: 5+Math.round(Math.random()*10), wind_gusts_10m: 12+Math.round(Math.random()*12),
      pressure_msl: 1013+Math.round(Math.random()*6-3), weather_code: 1 },
    daily: { time: Array.from({length:5},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i);return d.toISOString().slice(0,10);}),
      temperature_2m_max: Array.from({length:5},()=>high+Math.round(Math.random()*4-2)),
      temperature_2m_min: Array.from({length:5},()=>low+Math.round(Math.random()*4-2)) },
    _simulated: true,
  };
}
function WeatherApp({ onBack, onStatus }) {
  const [data, setData] = useState(null);
  const [status, setStatus] = useState("pending");
  const [updated, setUpdated] = useState("");
  const load = useCallback(async () => {
    setStatus("pending");
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,wind_gusts_10m,pressure_msl,weather_code&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FDenver&forecast_days=5`;
      const json = await fetchWithRetry(url);
      setData(json); setStatus("ok");
    } catch (e) { setData(simulatedWeather()); setStatus("sim"); }
    setUpdated(new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}));
  }, []);
  useEffect(() => { load(); }, [load]);
  useEffect(() => { onStatus?.(status); }, [status]);
  const c = data?.current, days = data?.daily;
  return (
    <AppShell title="WEATHER · CEDAR CITY" icon={ICONS.weather} status={status} onBack={onBack} onRefresh={load}>
      {!data && <div className="muted">ACQUIRING…</div>}
      {data?._simulated && <SimBanner text="LIVE LINK UNAVAILABLE — SHOWING TYPICAL JULY CONDITIONS" />}
      {c && <>
        <div className="weather-hero">
          <div className="temp-big">{Math.round(c.temperature_2m)}°</div>
          <div className="weather-hero-meta"><div className="condition">{WMO[c.weather_code] ?? "—"}</div><div className="muted">FEELS {Math.round(c.apparent_temperature)}°</div></div>
        </div>
        <div className="stat-grid">
          <div className="stat"><span className="stat-label">WIND</span><span className="stat-val">{Math.round(c.wind_speed_10m)} MPH</span></div>
          <div className="stat"><span className="stat-label">GUST</span><span className="stat-val">{Math.round(c.wind_gusts_10m)} MPH</span></div>

let openskyToken = null;
let openskyTokenExpiry = 0;
async function getOpenSkyToken(clientId, clientSecret) {
  if (openskyToken && Date.now() < openskyTokenExpiry) return openskyToken;
  const res = await fetchWithTimeout(
    "https://auth.opensky-network.org/auth/realms/opensky-network/protocol/openid-connect/token",
    {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: `grant_type=client_credentials&client_id=${encodeURIComponent(clientId)}&client_secret=${encodeURIComponent(clientSecret)}`,
    },
    8000
  );
  if (!res.ok) throw new Error("token request failed");
  const data = await res.json();
  openskyToken = data.access_token;
  openskyTokenExpiry = Date.now() + ((data.expires_in || 1800) - 30) * 1000;
  return openskyToken;
}

function FlightApp({ onBack, onStatus }) {
  const [flights, setFlights] = useState([]);
  const [status, setStatus] = useState("pending");
  const [updated, setUpdated] = useState("");
  const [authMode, setAuthMode] = useState(null);
  const lastGoodRef = useRef([]);

  const load = useCallback(async () => {
    setStatus("pending");
    const url = `https://opensky-network.org/api/states/all?lamin=${BBOX.lamin}&lomin=${BBOX.lomin}&lamax=${BBOX.lamax}&lomax=${BBOX.lomax}`;
    let json = null;
    let usedAuth = false;

    try {
      const settings = await loadJSON("mios_settings", {});
      if (settings.openskyClientId && settings.openskyClientSecret) {
        try {
          const token = await getOpenSkyToken(settings.openskyClientId, settings.openskyClientSecret);
          const res = await fetchWithTimeout(url, { headers: { Authorization: `Bearer ${token}` } }, 8000);
          if (!res.ok) throw new Error("HTTP " + res.status);
          json = await res.json();
          usedAuth = true;
        } catch (e) {
          json = null; // fall through to anonymous below
        }
      }
      if (!json) {
        json = await fetchWithRetry(url, {}, 2, 7000);
      }

      const rows = (json.states||[]).filter(s=>s[5]!=null&&s[6]!=null&&!s[8]).map(s=>({
        icao:s[0], callsign:(s[1]||"").trim()||"UNKNOWN", lon:s[5], lat:s[6],
        altFt:s[7]!=null?Math.round(s[7]*3.28084):null, speedKt:s[9]!=null?Math.round(s[9]*1.94384):null,
        heading:s[10]!=null?Math.round(s[10]):null,
      })).map(f=>({...f, nm:nmDistance(LAT,LON,f.lat,f.lon)})).sort((a,b)=>a.nm-b.nm).slice(0,8);

      setFlights(rows);
      lastGoodRef.current = rows;
      setAuthMode(usedAuth ? "auth" : "anon");
      setStatus("ok");
    } catch (e) {
      if (lastGoodRef.current.length > 0) {
        setFlights(lastGoodRef.current);
        setStatus("stale");
      } else {
        setFlights([]);
        setStatus("down");
      }
    }
    setUpdated(new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}));
  }, []);
  useEffect(() => { load(); }, [load]);
  useEffect(() => { onStatus?.(status==="stale" ? "sim" : status); }, [status]);
  return (
    <AppShell title="FLIGHT TRACKER · KCDC" icon={ICONS.flights} status={status==="stale"?"sim":status} onBack={onBack} onRefresh={load}>
      {status==="pending" && flights.length===0 && <div className="muted">SWEEPING 65NM…</div>}
      {status==="down" && <SimBanner text="OPENSKY FEED UNREACHABLE — LIKELY RATE-LIMITED (400/DAY ANONYMOUS CAP), TRY REFRESH IN A MINUTE" />}
      {status==="stale" && <SimBanner text="COULDN'T REFRESH — SHOWING LAST KNOWN TRAFFIC, MAY BE OUT OF DATE" />}
      {status==="ok" && authMode==="anon" && <div className="muted small" style={{marginBottom:8}}>Anonymous mode (400 req/day cap) — add OpenSky credentials in SETTINGS for 4,000/day.</div>}
      {status==="ok" && flights.length===0 && <div className="nominal">◆ NO TRAFFIC IN RANGE</div>}
      {flights.length>0 && <div className="flight-table">
        <div className="flight-row flight-head"><span>CALLSIGN</span><span>ALT</span><span>SPD</span><span>HDG</span><span>RNG</span></div>
        {flights.map(f=>(
          <div className="flight-row" key={f.icao}>
            <span className="mono-strong">{f.callsign}</span>
            <span>{f.altFt!=null?`${f.altFt.toLocaleString()}′`:"—"}</span>
            <span>{f.speedKt!=null?`${f.speedKt}kt`:"—"}</span>
            <span>{f.heading!=null?`${f.heading}°`:"—"}</span>
            <span>{f.nm.toFixed(0)}nm</span>
          </div>
        ))}
      </div>}
      <div className="timestamp" style={{marginTop:10}}>UPDATED {updated}</div>
    </AppShell>
  );
}

function Sparkline({ data, color }) {
  if (!data || data.length < 2) return <div className="muted small">Building history…</div>;
  const w = 280, h = 46, pad = 4;
  const min = Math.min(...data), max = Math.max(...data);
  const range = (max - min) || 1;
  const points = data.map((v,i) => {
    const x = pad + (i/(data.length-1))*(w-pad*2);
    const y = h - pad - ((v-min)/range)*(h-pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return (
    <div>
      <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%", height:46, display:"block"}}>
        <polyline points={points} fill="none" stroke={color} strokeWidth="2" />
      </svg>
      <div style={{display:"flex", justifyContent:"space-between"}}>
        <span className="muted small">{min.toFixed(1)}</span>
        <span className="muted small">{max.toFixed(1)}</span>
      </div>
    </div>
  );
}

function LongshotApp({ onBack, onStatus }) {
  const [readings, setReadings] = useState(null);
  const [tempHistory, setTempHistory] = useState(null);
  const [presHistory, setPresHistory] = useState(null);
  const [status, setStatus] = useState("pending");
  const [updated, setUpdated] = useState("");
  const [dataAge, setDataAge] = useState("");
  const load = useCallback(async () => {
    setStatus("pending");
    try {
      const settings = await loadJSON("mios_settings", {});
      const user = settings.aioUsername || DEFAULT_AIO_USERNAME;
      const key = settings.aioKey || DEFAULT_AIO_KEY;
      const results = await Promise.all(LONGSHOT_FEEDS.map(feed =>
        fetchWithRetry(`https://io.adafruit.com/api/v2/${user}/feeds/${feed}/data/last?x-aio-key=${key}`, {}, 2, 6000)
      ));
      const [temp, pres, lat, lon, rssi] = results;
      setReadings({ temp: parseFloat(temp.value), pres: parseFloat(pres.value), lat: parseFloat(lat.value),
        lon: parseFloat(lon.value), rssi: parseFloat(rssi.value), createdAt: temp.created_at });
      setStatus("ok");

      try {
        const [tempH, presH] = await Promise.all([
          fetchWithRetry(`https://io.adafruit.com/api/v2/${user}/feeds/longshot-temp/data?limit=20&x-aio-key=${key}`, {}, 1, 6000),
          fetchWithRetry(`https://io.adafruit.com/api/v2/${user}/feeds/longshot-pressure/data?limit=20&x-aio-key=${key}`, {}, 1, 6000),
        ]);
        setTempHistory(tempH.map(d=>parseFloat(d.value)).reverse());
        setPresHistory(presH.map(d=>parseFloat(d.value)).reverse());
      } catch (e) { /* history is a bonus — main readings already succeeded, don't fail the whole panel */ }
    } catch (e) { setStatus("down"); }
    setUpdated(new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}));
  }, []);
  useEffect(() => { load(); }, [load]);
  useEffect(() => { onStatus?.(status); }, [status]);
  useEffect(() => {
    if (!readings?.createdAt) return;
    const tick = () => {
      const secs = Math.round((Date.now() - new Date(readings.createdAt).getTime())/1000);
      setDataAge(secs<60 ? `${secs}s ago` : `${Math.round(secs/60)}m ago`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [readings]);
  const distNm = readings ? nmDistance(LAT, LON, readings.lat, readings.lon) : null;
  return (
    <AppShell title="LONGSHOT · MI-02" icon={ICONS.longshot} status={status} onBack={onBack} onRefresh={load}>
      {status==="pending" && !readings && <div className="muted">PULLING TELEMETRY…</div>}
      {status==="down" && <SimBanner text="COULD NOT REACH ADAFRUIT IO — CHECK BASE NODE IS POWERED + ON WIFI" />}
      {readings && <>
        <div className="weather-hero">
          <div className="temp-big">{readings.temp.toFixed(1)}°</div>
          <div className="weather-hero-meta"><div className="condition">REMOTE NODE TEMP (C)</div><div className="muted">DATA {dataAge||"—"}</div></div>
        </div>
        <div className="stat-grid">
          <div className="stat"><span className="stat-label">PRESSURE</span><span className="stat-val">{readings.pres.toFixed(1)} hPa</span></div>
          <div className="stat"><span className="stat-label">RSSI</span><span className="stat-val">{readings.rssi.toFixed(0)} dBm</span></div>
          <div className="stat"><span className="stat-label">LAT</span><span className="stat-val">{readings.lat.toFixed(4)}°</span></div>
          <div className="stat"><span className="stat-label">LON</span><span className="stat-val">{readings.lon.toFixed(4)}°</span></div>
        </div>
        <div className="condition">{readings.lat===0 && readings.lon===0 ? "REMOTE NODE HAS NO GPS FIX" : `≈ ${distNm.toFixed(2)} NM FROM BASE`}</div>

        <div className="eyebrow" style={{fontSize:10, margin:"16px 0 6px"}}>TEMP — LAST {tempHistory?.length || 0} READINGS (°C)</div>
        <Sparkline data={tempHistory} color="var(--cyan)" />

        <div className="eyebrow" style={{fontSize:10, margin:"16px 0 6px"}}>PRESSURE — LAST {presHistory?.length || 0} READINGS (hPa)</div>
        <Sparkline data={presHistory} color="var(--amber)" />

        <div className="timestamp" style={{marginTop:10}}>PANEL REFRESHED {updated}</div>
      </>}
    </AppShell>
  );
}

const UNIT_GROUPS = {
  Length: { m:1, ft:0.3048, in:0.0254, mm:0.001, cm:0.01, km:1000, mi:1609.34, nmi:1852, yd:0.9144 },
  Mass: { kg:1, g:0.001, lb:0.453592, oz:0.0283495, slug:14.5939, ton:907.185 },
  Force: { N:1, lbf:4.44822, kgf:9.80665, dyne:0.00001 },
  Torque: { "N·m":1, "lb·ft":1.35582, "lb·in":0.112985, "kg·m":9.80665 },
  Pressure: { Pa:1, kPa:1000, psi:6894.76, bar:100000, atm:101325, mmHg:133.322, inHg:3386.39 },
  Temperature: null,
  Energy: { J:1, kJ:1000, cal:4.184, kcal:4184, BTU:1055.06, "ft·lb":1.35582, kWh:3600000 },
  Power: { W:1, kW:1000, hp:745.7, "BTU/h":0.293071, "ft·lb/s":1.35582 },
  Volume: { L:1, mL:0.001, "gal(US)":3.78541, "ft³":28.3168, "in³":0.0163871, "m³":1000 },
  Area: { "m²":1, "ft²":0.092903, "in²":0.00064516, "km²":1000000, acre:4046.86, "mi²":2589988.11 },
  Speed: { "m/s":1, "km/h":0.277778, mph:0.44704, kt:0.514444, "ft/s":0.3048 },
  Density: { "kg/m³":1, "g/cm³":1000, "lb/ft³":16.0185 },
  Angle: { rad:1, deg:0.0174533, grad:0.0157080 },
};
function convertTemp(val, from, to) {
  let c = from==="C" ? val : from==="F" ? (val-32)*(5/9) : val-273.15;
  return to==="C" ? c : to==="F" ? c*(9/5)+32 : c+273.15;
}
function UnitApp({ onBack }) {
  const [group, setGroup] = useState("Length");
  const units = group==="Temperature" ? ["C","F","K"] : Object.keys(UNIT_GROUPS[group]);
  const [from, setFrom] = useState(units[0]);
  const [to, setTo] = useState(units[1]||units[0]);
  const [val, setVal] = useState("1");
  useEffect(() => { const u = group==="Temperature"?["C","F","K"]:Object.keys(UNIT_GROUPS[group]); setFrom(u[0]); setTo(u[1]||u[0]); }, [group]);
  const num = parseFloat(val);
  let result = null;
  if (!isNaN(num)) { result = group==="Temperature" ? convertTemp(num,from,to) : (num*UNIT_GROUPS[group][from])/UNIT_GROUPS[group][to]; }
  return (
    <AppShell title="UNIT CONVERTER" icon={ICONS.units} onBack={onBack}>
      <div className="pill-row">{Object.keys(UNIT_GROUPS).map(g => <button key={g} className={`pill ${g===group?"pill-active":""}`} onClick={()=>setGroup(g)}>{g.toUpperCase()}</button>)}</div>
      <input className="text-input" style={{marginTop:12}} type="number" value={val} onChange={e=>setVal(e.target.value)} />
      <div className="convert-row">
        <select className="select-input" value={from} onChange={e=>setFrom(e.target.value)}>{units.map(u=><option key={u} value={u}>{u}</option>)}</select>
        <span className="muted">→</span>
        <select className="select-input" value={to} onChange={e=>setTo(e.target.value)}>{units.map(u=><option key={u} value={u}>{u}</option>)}</select>
      </div>
      <div className="convert-result">{result!=null?result.toFixed(4):"—"} <span className="muted small">{to}</span></div>
    </AppShell>
  );
}

  const save = () => { if (!label.trim() || !date) return; const t = {label:label.trim(), date}; setTarget(t); saveJSON("mios_countdown", t); };
  let remain = null;
  if (target) { const diffMs = new Date(target.date+"T00:00:00") - now; remain = Math.max(0, diffMs); }
  const days = remain!=null ? Math.floor(remain/86400000) : null;
  const hours = remain!=null ? Math.floor((remain%86400000)/3600000) : null;
  return (
    <AppShell title="MISSION COUNTDOWN" icon={ICONS.countdown} onBack={onBack}>
      {!loaded ? <div className="muted">LOADING…</div> : <>
        {target && <div className="weather-hero" style={{marginBottom:16}}>
          <div className="temp-big" style={{fontSize:40}}>{days}</div>
          <div className="weather-hero-meta"><div className="condition">DAYS · {hours}H</div><div className="muted">{target.label.toUpperCase()}</div></div>
        </div>}
        <div className="muted small" style={{marginBottom:4}}>LABEL</div>
        <input className="text-input" value={label} onChange={e=>setLabel(e.target.value)} placeholder="e.g. FINALS WEEK" />
        <div className="muted small" style={{margin:"10px 0 4px"}}>TARGET DATE</div>
        <input className="text-input" type="date" value={date} onChange={e=>setDate(e.target.value)} />
        <button className="full-btn" onClick={save}>SET TARGET</button>
      </>}
    </AppShell>
  );
}

// ---------- BACKUP ----------
const BACKUP_KEYS = ["mios_projects", "mios_notes", "mios_countdown", "mios_budget", "mios_settings", "mios_log"];
function BackupApp({ onBack }) {
  const [msg, setMsg] = useState("");
  const fileInputRef = useRef(null);

  const exportData = () => {
    const dump = {};
    BACKUP_KEYS.forEach(k => {
      const v = localStorage.getItem(k);
      if (v != null) dump[k] = JSON.parse(v);
    });
    const blob = new Blob([JSON.stringify(dump, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `mios-backup-${todayKey()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    setMsg("Exported.");
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        BACKUP_KEYS.forEach(k => {
          if (parsed[k] !== undefined) localStorage.setItem(k, JSON.stringify(parsed[k]));
        });
        setMsg("Imported. Reloading…");
        setTimeout(() => window.location.reload(), 900);
      } catch (err) {
        setMsg("Import failed — file wasn't valid MIOS backup JSON.");
      }
    };
    reader.readAsText(file);
  };

  const clearAll = () => {
    if (!window.confirm("This wipes all local MIOS data on this device — projects, notes, countdown, budget, settings. Export a backup first if you want to keep it. Continue?")) return;
    BACKUP_KEYS.forEach(k => localStorage.removeItem(k));
    setMsg("Cleared. Reloading…");
    setTimeout(() => window.location.reload(), 900);
  };

  return (
    <AppShell title="SYSTEM BACKUP" icon={ICONS.backup} onBack={onBack}>
      <div className="muted" style={{lineHeight:1.6, marginBottom:14}}>
        Projects, notes, countdown, budget, and settings all live only in this browser's local storage. Clearing site data or switching browsers/devices loses it — export a backup now and then, especially before doing anything drastic.
      </div>
      <button className="full-btn" onClick={exportData}>EXPORT BACKUP (.json)</button>
      <button className="full-btn" onClick={()=>fileInputRef.current.click()} style={{marginTop:8}}>IMPORT BACKUP</button>
      <input ref={fileInputRef} type="file" accept="application/json" style={{display:"none"}} onChange={importData} />
      <button className="full-btn" onClick={clearAll} style={{marginTop:8, borderColor:"var(--red-alert)", color:"var(--red-alert)"}}>CLEAR ALL LOCAL DATA</button>
      {msg && <div className="nominal" style={{marginTop:12}}>{msg}</div>}
    </AppShell>
  );
}


// ---------- BUDGET ----------
function monthKey(d = new Date()) { return d.toISOString().slice(0,7); }
function BudgetApp({ onBack }) {
  const [goal, setGoal] = useState("");
  const [entries, setEntries] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");

  useEffect(() => {
    loadJSON("mios_budget", { goal: null, entries: [] }).then(b => {
      setGoal(b.goal != null ? String(b.goal) : "");
      setEntries(b.entries || []);
      setLoaded(true);
    });
  }, []);

  const persist = (nextGoal, nextEntries) => {
    const g = nextGoal.trim()==="" ? null : parseFloat(nextGoal);
    saveJSON("mios_budget", { goal: (g!=null && !isNaN(g)) ? g : null, entries: nextEntries });
  };

  const saveGoal = (val) => { setGoal(val); persist(val, entries); };

  const addEntry = () => {
    const amt = parseFloat(amount);
    if (isNaN(amt) || amt <= 0) return;
    const next = [{ id:"b"+Date.now(), amount: amt, note: note.trim() || "—", date: todayKey() }, ...entries];
    setEntries(next);
    persist(goal, next);
    setAmount(""); setNote("");
  };
  const removeEntry = (id) => {
    const next = entries.filter(e=>e.id!==id);
    setEntries(next);
    persist(goal, next);
  };

  const thisMonth = monthKey();
  const monthEntries = entries.filter(e => e.date.startsWith(thisMonth));
  const spent = monthEntries.reduce((s,e)=>s+e.amount, 0);
  const goalNum = goal.trim()==="" ? null : parseFloat(goal);
  const remaining = goalNum != null ? goalNum - spent : null;
  const pctUsed = goalNum != null && goalNum > 0 ? (spent/goalNum*100) : null;
  const barColor = pctUsed == null ? "var(--cyan)" : pctUsed >= 100 ? "var(--red-alert)" : pctUsed >= 80 ? "var(--amber)" : "var(--green-ok)";

  return (
    <AppShell title="BUDGET" icon={ICONS.budget} onBack={onBack}>
      {!loaded ? <div className="muted">LOADING…</div> : <>
        <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:14}}>
          <span className="muted small">MONTHLY GOAL $</span>
          <input className="text-input" type="number" style={{width:100}} value={goal} placeholder="e.g. 400" onChange={e=>saveGoal(e.target.value)} />
        </div>

        <div className="weather-hero" style={{marginBottom:8}}>
          <div className="temp-big" style={{fontSize:32, color: barColor}}>${spent.toFixed(0)}</div>
          <div className="weather-hero-meta">
            <div className="condition">SPENT THIS MONTH</div>
            <div className="muted">{remaining!=null ? `$${remaining.toFixed(0)} remaining` : "set a goal to track remaining"}</div>
          </div>
        </div>
        {pctUsed != null && (
          <div style={{height:6, background:"var(--bg-panel-2)", border:"1px solid var(--line)", marginBottom:16}}>
            <div style={{height:"100%", width:`${Math.min(100,pctUsed)}%`, background:barColor}} />
          </div>
        )}

        <div style={{display:"flex", gap:6, marginBottom:6}}>
          <input className="text-input" type="number" placeholder="AMOUNT" value={amount} onChange={e=>setAmount(e.target.value)} style={{width:110}} />
          <input className="text-input" placeholder="WHAT FOR" value={note} onChange={e=>setNote(e.target.value)} />
        </div>
        <button className="full-btn" onClick={addEntry} style={{marginBottom:14}}>ADD EXPENSE</button>

        <div className="eyebrow" style={{fontSize:10, marginBottom:8}}>THIS MONTH</div>
        <div className="note-list" style={{marginTop:0}}>
          {monthEntries.length===0 && <div className="muted">NOTHING LOGGED YET</div>}
          {monthEntries.map(e => (
            <div className="note-item" key={e.id}>
              <div className="note-foot">
                <span className="note-text" style={{marginBottom:0}}>${e.amount.toFixed(2)} — {e.note}</span>
                <button className="icon-btn" onClick={()=>removeEntry(e.id)}>{ICONS.trash}</button>
              </div>
            </div>
          ))}
        </div>
        <div className="muted small" style={{marginTop:10}}>Resets automatically each calendar month. Old months stay in your backup export.</div>
      </>}
    </AppShell>
  );
}

// ---------- CALCULATOR ----------
function CalculatorApp({ onBack }) {
  const [expr, setExpr] = useState("");
  const [result, setResult] = useState("");

  const append = (token) => setExpr(e => e + token);
  const clear = () => { setExpr(""); setResult(""); };
  const del = () => setExpr(e => e.slice(0, -1));
  const equals = () => {
    try { setResult(String(math.evaluate(expr))); }
    catch (e) { setResult("ERROR"); }
  };

  useEffect(() => {
    if (!expr) { setResult(""); return; }
    try { setResult(String(math.evaluate(expr))); }
    catch (e) { /* mid-typing invalid expression — leave last good result displayed */ }
  }, [expr]);

  const ROWS = [
    ["sin(","cos(","tan(","^","AC"],
    ["√(","ln(","log(","(",")"],
    ["7","8","9","/","%"],
    ["4","5","6","*","π"],
    ["1","2","3","-","e"],
    ["0",".","DEL","+","="],
  ];
  const OP = ["+","-","*","/","^"];
  const FN = ["sin(","cos(","tan(","√(","ln(","log(","AC","DEL"];

  const press = (btn) => {
    if (btn === "AC") return clear();
    if (btn === "DEL") return del();
    if (btn === "=") return equals();
    if (btn === "√(") return append("sqrt(");
    if (btn === "π") return append("pi");
    append(btn);
  };

  return (
    <AppShell title="CALCULATOR" icon={ICONS.calc} onBack={onBack}>
      <div className="calc-display">
        <div className="calc-expr">{expr || " "}</div>
        <div className="calc-result">{result || "0"}</div>
      </div>
      <div className="calc-grid">
        {ROWS.flat().map((b,i) => (
          <button
            key={i}
            className={`calc-btn ${b==="="?"calc-btn-eq":OP.includes(b)?"calc-btn-op":FN.includes(b)?"calc-btn-fn":""}`}
            onClick={()=>press(b)}
          >{b}</button>
        ))}
      </div>
      <div className="muted small" style={{marginTop:10}}>Trig in radians. Type parens to close functions yourself.</div>
    </AppShell>
  );
}

function HomeWeatherWidget() {
  const [data, setData] = useState(null);
  const [status, setStatus] = useState("pending");
  const seenAlertIds = useRef(new Set());
  const firstStormCheck = useRef(true);

  useEffect(() => {
    let cancelled = false;
    const pollWeather = async () => {
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America%2FDenver&forecast_days=1`;
        const json = await fetchWithRetry(url, {}, 2, 6000);
        if (!cancelled) { setData(json); setStatus("ok"); }
      } catch (e) { if (!cancelled) setStatus("down"); }
    };
    const pollStorm = async () => {
      try {
        const url = `https://api.weather.gov/alerts/active?point=${LAT},${LON}`;
        const json = await fetchWithRetry(url, {}, 1, 6000);
        const features = json.features || [];
        // don't flash for alerts already active before MIOS was opened — only genuinely new ones
        if (firstStormCheck.current) {
          features.forEach(f => seenAlertIds.current.add(f.id));
          firstStormCheck.current = false;
          return;
        }
        for (const f of features) {
          if (seenAlertIds.current.has(f.id)) continue;
          seenAlertIds.current.add(f.id);
          const sev = (f.properties.severity || "").toLowerCase();
          const isSevere = sev === "extreme" || sev === "severe";
          pushLightCommand(isSevere ? "flash:ff0000:6" : "flash:ff8c00:4").catch(() => {});
          logEvent("STORM", `${f.properties.event}${isSevere ? " (SEVERE)" : ""}`, isSevere ? "var(--red-alert)" : "var(--amber)");
        }
      } catch (e) { /* storm feed hiccup — don't affect weather display */ }
    };
    pollWeather();
    pollStorm();
    const wId = setInterval(pollWeather, 10 * 60 * 1000);
    const sId = setInterval(pollStorm, 5 * 60 * 1000);
    return () => { cancelled = true; clearInterval(wId); clearInterval(sId); };
  }, []);
  const c = data?.current, d = data?.daily;
  return (
    <div className="home-widget">
      <div className="home-widget-head">
        <span className="eyebrow" style={{fontSize:10}}>{ICONS.weather} WEATHER · CEDAR CITY</span>
        <StatusLED status={status==="ok"?"ok":status==="down"?"down":"pending"} />
      </div>
      <div className="home-widget-body">
        {status==="pending" && <div className="muted">ACQUIRING…</div>}
        {status==="down" && <div className="muted" style={{color:"var(--red-alert)"}}>LINK DOWN</div>}
        {c && (
          <div className="weather-hero" style={{marginBottom:0}}>
            <div className="temp-big" style={{fontSize:34}}>{Math.round(c.temperature_2m)}°</div>
            <div className="weather-hero-meta">
              <div className="condition">{WMO[c.weather_code] ?? "—"}</div>
              {d && <div className="muted">H {Math.round(d.temperature_2m_max[0])}° · L {Math.round(d.temperature_2m_min[0])}°</div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function HomeLongshotMap({ lat, lon }) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const markerRef = useRef(null);

  useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current || typeof L === "undefined") return;
    const map = L.map(mapRef.current, { zoomControl: false }).setView([lat, lon], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);
    mapInstanceRef.current = map;
    return () => { map.remove(); mapInstanceRef.current = null; };
  }, []);

  useEffect(() => {
    const map = mapInstanceRef.current;
    if (!map || lat == null || lon == null) return;
    if (markerRef.current) {
      markerRef.current.setLatLng([lat, lon]);
    } else {
      markerRef.current = L.circleMarker([lat, lon], { radius: 7, color: "#ffb400", fillColor: "#ffb400", fillOpacity: 0.9, weight: 2 }).addTo(map);
    }
    map.setView([lat, lon], map.getZoom());
  }, [lat, lon]);

  return <div ref={mapRef} className="home-map" />;
}

function HomeLongshotWidget() {
  const [readings, setReadings] = useState(null);
  const [tempHistory, setTempHistory] = useState(null);
  const [status, setStatus] = useState("pending");
  const prevStatusRef = useRef("pending");
  const weakSignalRef = useRef(false);

  useEffect(() => {
    let cancelled = false;
    const poll = async () => {
      try {
        const settings = await loadJSON("mios_settings", {});
        const user = settings.aioUsername || DEFAULT_AIO_USERNAME;
        const key = settings.aioKey || DEFAULT_AIO_KEY;
        const results = await Promise.all(LONGSHOT_FEEDS.map(feed =>
          fetchWithRetry(`https://io.adafruit.com/api/v2/${user}/feeds/${feed}/data/last?x-aio-key=${key}`, {}, 2, 6000)
        ));
        const [temp, pres, lat, lon, rssi] = results;
        if (cancelled) return;
        const rssiVal = parseFloat(rssi.value);
        setReadings({ temp: parseFloat(temp.value), pres: parseFloat(pres.value), lat: parseFloat(lat.value), lon: parseFloat(lon.value), rssi: rssiVal });
        setStatus("ok");
        prevStatusRef.current = "ok";

        // weak-signal warning — distinct from full link loss, fires once when crossing the threshold
        const isWeak = rssiVal < -100;
        if (isWeak && !weakSignalRef.current) {
          pushLightCommand("flash:ff8c00:3").catch(() => {});
          logEvent("LONGSHOT", `Weak signal warning — RSSI ${rssiVal.toFixed(0)} dBm`, "var(--amber)");
        }
        weakSignalRef.current = isWeak;

        try {
          const tempH = await fetchWithRetry(`https://io.adafruit.com/api/v2/${user}/feeds/longshot-temp/data?limit=20&x-aio-key=${key}`, {}, 1, 6000);
          if (!cancelled) setTempHistory(tempH.map(d=>parseFloat(d.value)).reverse());
        } catch (e) {}
      } catch (e) {
        if (cancelled) return;
        const justLostLink = prevStatusRef.current !== "down";
        setStatus("down");
        prevStatusRef.current = "down";
        if (justLostLink) {
          // one-time alert flash — only fires on the transition into "down," not every retry
          pushLightCommand("flash:ff0000:3").catch(() => {});
          logEvent("LONGSHOT", "Telemetry link lost", "var(--red-alert)");
        }
      }
    };
    poll();
    const id = setInterval(poll, 45000);
    return () => { cancelled = true; clearInterval(id); };
  }, []);

  const hasFix = readings && !(readings.lat===0 && readings.lon===0);

  return (
    <div className="home-widget">
      <div className="home-widget-head">
        <span className="eyebrow" style={{fontSize:10}}>{ICONS.longshot} LONGSHOT · MI-02</span>
        <StatusLED status={status==="ok"?"ok":status==="down"?"down":"pending"} />
      </div>
      <div className="home-widget-body">
        {status==="pending" && <div className="muted">PULLING TELEMETRY…</div>}
        {status==="down" && <div className="muted" style={{color:"var(--red-alert)"}}>LINK DOWN — CHECK BASE NODE</div>}
        {readings && <>
          <div className="stat-grid" style={{marginBottom:10}}>
            <div className="stat"><span className="stat-label">TEMP</span><span className="stat-val">{readings.temp.toFixed(1)}°C</span></div>
            <div className="stat"><span className="stat-label">PRESSURE</span><span className="stat-val">{readings.pres.toFixed(1)} hPa</span></div>
            <div className="stat"><span className="stat-label">RSSI</span><span className="stat-val">{readings.rssi.toFixed(0)} dBm</span></div>
            <div className="stat"><span className="stat-label">GPS FIX</span><span className="stat-val">{hasFix ? "YES" : "NO"}</span></div>
          </div>
          <div className="eyebrow" style={{fontSize:9, marginBottom:4}}>TEMP TREND</div>
          <Sparkline data={tempHistory} color="var(--cyan)" />
          {hasFix
            ? <div style={{marginTop:10}}><HomeLongshotMap lat={readings.lat} lon={readings.lon} /></div>
            : <div className="muted small" style={{marginTop:8}}>No GPS fix yet — map appears once the remote node locks on.</div>}
        </>}
      </div>
    </div>
  );
}

// ---------- BACKGROUND WATCHERS (no UI — pure sense-to-react) ----------
function FlightWatcher() {
  const seenIcao = useRef(new Set());
  const firstCheck = useRef(true);

  useEffect(() => {
    let cancelled = false;
    const poll = async () => {
      try {
        const url = `https://opensky-network.org/api/states/all?lamin=${BBOX.lamin}&lomin=${BBOX.lomin}&lamax=${BBOX.lamax}&lomax=${BBOX.lomax}`;
        const json = await fetchWithRetry(url, {}, 1, 7000);
        if (cancelled) return;
        const icaos = (json.states||[]).filter(s=>s[5]!=null&&s[6]!=null&&!s[8]).map(s=>s[0]);
        if (firstCheck.current) {
          icaos.forEach(id => seenIcao.current.add(id));
          firstCheck.current = false;
          return;
        }
        const newOnes = icaos.filter(id => !seenIcao.current.has(id));
        icaos.forEach(id => seenIcao.current.add(id));
        seenIcao.current.forEach(id => { if (!icaos.includes(id)) seenIcao.current.delete(id); });
        if (newOnes.length > 0) {
          pushLightCommand("flash:00e5ff:2").catch(() => {});
          logEvent("FLIGHT", `${newOnes.length} new aircraft entered 65nm range`, "var(--cyan)");
        }
      } catch (e) { /* silent — this is a background nicety, not a critical feed */ }
    };
    poll();
    const id = setInterval(poll, 60000);
    return () => { cancelled = true; clearInterval(id); };
  }, []);

  return null;
}

function IssWatcher() {
  const lastAlertAt = useRef(0);

  useEffect(() => {
    let cancelled = false;
    const poll = async () => {
      try {
        const json = await fetchWithRetry("https://api.wheretheiss.at/v1/satellites/25544", {}, 1, 6000);
        if (cancelled) return;
        const distKm = nmDistance(LAT, LON, json.latitude, json.longitude) * 1.852;
        const issSunlit = json.visibility === "daylight";
        const localHour = parseInt(new Date().toLocaleString("en-US", { timeZone: "America/Denver", hour: "2-digit", hour12: false }));
        const probablyDark = localHour < 6 || localHour >= 21;
        const inRange = distKm < 1200;
        const cooldownOk = Date.now() - lastAlertAt.current > 10 * 60 * 1000;
        if (issSunlit && probablyDark && inRange && cooldownOk) {
          lastAlertAt.current = Date.now();
          pushLightCommand("flash:ffffff:4").catch(() => {});
          logEvent("ISS", `Possible visible pass — ${Math.round(distKm)}km away`, "var(--text-primary)");
        }
      } catch (e) { /* silent */ }
    };
    poll();
    const id = setInterval(poll, 2 * 60 * 1000);
    return () => { cancelled = true; clearInterval(id); };
  }, []);

  return null;
}

// ---------- PULSE (device control) ----------
async function logEvent(type, message, color) {
  try {
    const existing = await loadJSON("mios_log", []);
    const entry = { id: "l"+Date.now()+Math.random().toString(36).slice(2,6), type, message, color: color || "var(--text-primary)", ts: new Date().toISOString() };
    const next = [entry, ...existing].slice(0, 100);
    await saveJSON("mios_log", next);
  } catch (e) {}
}

async function pushLightCommand(cmd) {
  const settings = await loadJSON("mios_settings", {});
  const user = settings.aioUsername || DEFAULT_AIO_USERNAME;
  const key = settings.aioKey || DEFAULT_AIO_KEY;
  const res = await fetchWithTimeout(
    `https://io.adafruit.com/api/v2/${user}/feeds/mi-pulse-cmd/data`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-AIO-Key": key },
      body: JSON.stringify({ value: cmd }),
    },
    6000
  );
  if (!res.ok) throw new Error("HTTP " + res.status);
}

const PULSE_COLORS = [
  { hex: "ff0000", label: "RED", swatch: "#ff4d4f" },
  { hex: "00ff00", label: "GREEN", swatch: "#4fd88c" },
  { hex: "0000ff", label: "BLUE", swatch: "#3f8cff" },
  { hex: "ff8c00", label: "AMBER", swatch: "#ffb400" },
  { hex: "ffffff", label: "WHITE", swatch: "#f2f2f2" },
];

function PulseApp({ onBack }) {
  const [sending, setSending] = useState(null);
  const [flashMsg, setFlashMsg] = useState("");
  const [on, setOn] = useState(true);
  const [color, setColor] = useState("#ff8c00");
  const [brightness, setBrightness] = useState(30);

  const send = async (cmd, label) => {
    setSending(label);
    setFlashMsg("");
    try {
      await pushLightCommand(cmd);
      setFlashMsg(`${label} sent — up to 3s to apply.`);
    } catch (e) {
      setFlashMsg("Couldn't reach Adafruit IO — check your connection.");
    }
    setSending(null);
  };

  const applyColor = (hex) => {
    setColor(hex);
    setOn(true);
    send(`color:${hex.replace("#","")}`, "COLOR");
  };

  const toggleOn = () => {
    const next = !on;
    setOn(next);
    send(next ? "on" : "off", next ? "ON" : "OFF");
  };

  const applyBrightness = (val) => {
    setBrightness(val);
    send(`bright:${val}`, "BRIGHTNESS");
  };

  return (
    <AppShell title="MI-PULSE · LED CONTROL" icon={ICONS.pulse} onBack={onBack}>
      <div className="muted small" style={{marginBottom:14}}>197-LED strip. Idle mode holds whatever you set here, like a normal strip. Polls every 3s, so there's a short delay — that's normal.</div>

      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14}}>
        <span className="eyebrow" style={{fontSize:11}}>POWER</span>
        <button className="full-btn" style={{marginTop:0, width:110, borderColor: on?"var(--green-ok)":"var(--text-dim)", color: on?"var(--green-ok)":"var(--text-dim)"}} onClick={toggleOn}>
          {sending==="ON"||sending==="OFF" ? "…" : (on ? "ON" : "OFF")}
        </button>
      </div>

      <div className="eyebrow" style={{fontSize:11, marginBottom:8}}>COLOR</div>
      <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:14}}>
        <input type="color" value={color} onChange={e=>applyColor(e.target.value)} style={{width:52, height:40, border:"1px solid var(--line)", background:"none", padding:0}} />
        <span className="muted small">Tap to pick any color — applies instantly.</span>
      </div>
      <div className="pulse-grid" style={{marginBottom:16}}>
        {PULSE_COLORS.map(c => (
          <button key={c.hex} className="pulse-btn" style={{"--swatch":c.swatch}} disabled={sending==="COLOR"} onClick={()=>applyColor("#"+c.hex)}>
            <span className="pulse-swatch" />
            <span>{c.label}</span>
          </button>
        ))}
      </div>

      <div className="eyebrow" style={{fontSize:11, marginBottom:8}}>BRIGHTNESS — {brightness}/255</div>
      <input type="range" min="0" max="30" value={brightness} onChange={e=>setBrightness(parseInt(e.target.value))} onMouseUp={e=>applyBrightness(parseInt(e.target.value))} onTouchEnd={e=>applyBrightness(brightness)} style={{width:"100%", marginBottom:6}} />
      <div className="muted small" style={{marginBottom:16}}>Capped at 30/255 until you've got a dedicated 5V supply wired to the strip — firmware enforces this too, not just this slider.</div>

      <div style={{display:"flex", gap:8, marginBottom:16}}>
        <button className="full-btn" style={{marginTop:0, borderColor:"var(--cyan)", color:"var(--cyan)"}} disabled={sending==="RAINBOW"} onClick={()=>send("rainbow","RAINBOW")}>{sending==="RAINBOW" ? "SENDING…" : "RAINBOW"}</button>
        <button className="full-btn" style={{marginTop:0, borderColor:"var(--red-alert)", color:"var(--red-alert)"}} disabled={sending==="TEST ALERT"} onClick={()=>send("flash:ff0000:3","TEST ALERT")}>{sending==="TEST ALERT" ? "SENDING…" : "TEST ALERT FLASH"}</button>
      </div>

      <div className="muted small" style={{lineHeight:1.6}}>
        Longshot automatically flashes the strip red for a few seconds if the telemetry link drops — happens on top of whatever idle color/state you have set, then reverts back automatically. Only works while MIOS is open in a tab (no background server behind this).
      </div>

      {flashMsg && <div className="nominal" style={{marginTop:14}}>{flashMsg}</div>}
    </AppShell>
  );
}

function SystemLogApp({ onBack }) {
  const [entries, setEntries] = useState([]);

  const load = useCallback(() => {
    loadJSON("mios_log", []).then(v => { setEntries(v); setLoaded(true); });

  useEffect(() => { load(); }, [load]);

  };

  return (
    <AppShell title="SYSTEM LOG" icon={ICONS.log} onBack={onBack} onRefresh={load}>
      <div className="muted small" style={{marginBottom:14}}>Every automatic alert MIOS has fired — storm alerts, Longshot link/signal events, new aircraft, ISS passes. Keeps the last 100.</div>
      {!loaded ? <div className="muted">LOADING…</div> : <>
        {entries.length === 0 && <div className="muted">NO EVENTS LOGGED YET</div>}
        <div className="note-list" style={{marginTop:0}}>
          {entries.map(e => (
            <div className="note-item" key={e.id} style={{borderLeft:`2px solid ${e.color}`}}>
              <div style={{display:"flex", justifyContent:"space-between", marginBottom:3}}>
                <span className="alert-tag" style={{background:"transparent", border:`1px solid ${e.color}`, color:e.color}}>{e.type}</span>
                <span className="muted small">{new Date(e.ts).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}</span>

    </AppShell>
  );
}

// ---------- CORE ----------
function CoreApp({ onBack }) {
  const [messages, setMessages] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [listening, setListening] = useState(false);
  const [errMsg, setErrMsg] = useState("");
  const scrollRef = useRef(null);
  const recognitionRef = useRef(null);

  useEffect(() => {
    loadJSON("mios_core_history", []).then(v => { setMessages(v); setLoaded(true); });
  }, []);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, busy]);

  const persist = (next) => { setMessages(next); saveJSON("mios_core_history", next.slice(-30)); };

  const send = async (text) => {
    const content = text.trim();
    if (!content || busy) return;
    setErrMsg("");
    const next = [...messages, { role: "user", content }];
    persist(next);
    setInput("");
    setBusy(true);
    try {
      const settings = await loadJSON("mios_settings", {});
      const res = await fetchWithTimeout(
        "/.netlify/functions/core",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages: next.map(m => ({ role: m.role, content: m.content })),
            aioUsername: settings.aioUsername || DEFAULT_AIO_USERNAME,
            aioKey: settings.aioKey || DEFAULT_AIO_KEY,
          }),
        },
        30000
      );
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "CORE request failed.");
      persist([...next, { role: "assistant", content: data.reply || "…" }]);
    } catch (e) {
      setErrMsg("CORE didn't respond — check that the backend function is deployed and GROQ_API_KEY is set in Netlify.");
    }
    setBusy(false);
  };

  const SpeechRecognitionClass = typeof window !== "undefined" ? (window.SpeechRecognition || window.webkitSpeechRecognition) : null;
  const startVoice = () => {
    if (!SpeechRecognitionClass) return;
    const rec = new SpeechRecognitionClass();
    rec.lang = "en-US";
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onresult = (e) => { send(e.results[0][0].transcript); setListening(false); };
    rec.onerror = () => setListening(false);
    rec.onend = () => setListening(false);
    recognitionRef.current = rec;
    setListening(true);
    rec.start();
  };

  const clearHistory = async () => {
    if (!window.confirm("Clear CORE's conversation history?")) return;
    await saveJSON("mios_core_history", []);
    setMessages([]);
  };

  return (
    <AppShell title="CORE" icon={ICONS.core} onBack={onBack} onRefresh={clearHistory}>
      <div style={{display:"flex", flexDirection:"column", height:"calc(100vh - 90px)"}}>
        <div ref={scrollRef} style={{flex:1, overflowY:"auto", marginBottom:10}}>
          {!loaded && <div className="muted">LOADING…</div>}
          {loaded && messages.length===0 && (
            <div className="muted small" style={{lineHeight:1.7}}>
              CORE has real tools — it can check weather, storm alerts, flights, ISS, Longshot telemetry, and control MI-Pulse directly. Try "what's my Longshot signal looking like" or "flash the lights blue."
            </div>
          )}
          {messages.map((m, i) => (
            <div key={i} className={`core-msg core-msg-${m.role}`}>
              <div className="core-msg-role">{m.role === "user" ? "YOU" : "CORE"}</div>
              <div className="core-msg-text">{m.content}</div>
            </div>
          ))}
          {busy && <div className="core-msg core-msg-assistant"><div className="core-msg-role">CORE</div><div className="core-msg-text muted">thinking…</div></div>}
        </div>
        {errMsg && <div className="muted alert-text small" style={{marginBottom:8}}>{errMsg}</div>}
        <div className="palette-input-row" style={{border:"1px solid var(--line)"}}>
          <input
            className="palette-input"
            placeholder="Ask CORE anything about your systems…"
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e => { if (e.key==="Enter") send(input); }}
          />
          {SpeechRecognitionClass && (
            <button className={`palette-mic ${listening?"listening":""}`} onClick={startVoice}>{listening ? "●" : "🎤"}</button>
          )}
          <button className="icon-btn" onClick={()=>send(input)} disabled={busy}>➤</button>
        </div>
      </div>
    </AppShell>
  );
}

  { id:"core", label:"CORE", icon:ICONS.core, accent:"var(--cyan)", section:"DEVICES" },

];

function MIOS() {
  const [screen, setScreen] = useState("home");
  const [moduleStatus, setModuleStatus] = useState({});
  const now = useClock();
  const setStatusFor = (id) => (s) => setModuleStatus(prev => ({...prev, [id]: s}));
  const localTime = now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false});
  const dateStr = now.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  const liveCount = LIVE_APP_IDS.filter(id => moduleStatus[id]==="ok").length;
  const goBack = () => setScreen("home");
  const renderApp = () => {
    switch (screen) {
      case "weather": return <WeatherApp onBack={goBack} onStatus={setStatusFor("weather")} />;
      case "storm": return <StormApp onBack={goBack} onStatus={setStatusFor("storm")} />;
      case "flights": return <FlightApp onBack={goBack} onStatus={setStatusFor("flights")} />;
      case "iss": return <IssApp onBack={goBack} onStatus={setStatusFor("iss")} />;
      case "longshot": return <LongshotApp onBack={goBack} onStatus={setStatusFor("longshot")} />;
      case "projects": return <ProjectApp onBack={goBack} />;
      case "notes": return <NotesApp onBack={goBack} />;
      case "units": return <UnitApp onBack={goBack} />;
      case "calc": return <CalculatorApp onBack={goBack} />;
      case "countdown": return <CountdownApp onBack={goBack} />;
      case "budget": return <BudgetApp onBack={goBack} />;
      case "core": return <CoreApp onBack={goBack} />;
      case "pulse": return <PulseApp onBack={goBack} />;
      case "settings": return <SettingsApp onBack={goBack} />;
      case "backup": return <BackupApp onBack={goBack} />;
      case "log": return <SystemLogApp onBack={goBack} />;
      default: return null;
    }
  };
  return (
    <>
    {screen==="home" ? (
    <>
      <div className="status-bar">
        <div className="status-bar-top">
          <div className="callsign">Marcus Industries <small>// MIOS</small></div>
          <div className="clock-block"><div className="big-time">{localTime}</div><div>{dateStr}</div></div>
        </div>
        <div className="status-bar-sub">
          <span>SITE: <b>CEDAR CITY, UT</b></span>
          <span>ELEV: <b>{ELEV_FT.toLocaleString()} FT</b></span>
          <span>LIVE FEEDS: <b>{liveCount}/{LIVE_APP_IDS.length}</b></span>
        </div>
      </div>
      <div className="section-block">
        <div className="eyebrow section-label">LIVE DATA</div>
        <HomeWeatherWidget />
        <HomeLongshotWidget />
        <FlightWatcher />
        <IssWatcher />
      </div>
      {SECTIONS.map(sec => (
        <div className="section-block" key={sec}>
          <div className="eyebrow section-label">{sec}</div>
          <div className="app-grid">
            {APPS.filter(a=>a.section===sec).map(a => (
              <button key={a.id} className="app-icon-btn" onClick={()=>setScreen(a.id)}>
                {LIVE_APP_IDS.includes(a.id) && <span className="app-icon-led"><StatusLED status={moduleStatus[a.id]||"pending"} /></span>}
                <span className="app-icon-glyph" style={{color:a.accent}}>{a.icon}</span>
                <span className="app-icon-label">{a.label}</span>
              </button>
            ))}
          </div>
        </div>
      ))}
      <div className="footer">MIOS v0.4 — CEDAR CITY NODE — STANDALONE BUILD</div>
    </>
  ) : renderApp()}
    </>
  );
}
